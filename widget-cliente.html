<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Sports — Escolha seu número</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #222; }
  .widget { max-width: 680px; margin: 0 auto; padding: 16px; max-height: 92vh; overflow-y: auto; }

  .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 13px; font-weight: 600; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; } 
  .tab.active { color: #c0392b; border-bottom-color: #c0392b; }

  .produto-selector { margin-bottom: 18px; }
  .produto-selector label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; display: block; margin-bottom: 6px; }
  .produto-selector select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; }

  .secao-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; margin-bottom: 8px; }
  .legenda { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legenda span { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
  .legenda-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .legenda-dot.disponivel { border: 2px solid #ccc; background: #fff; }
  .legenda-dot.selecionado { background: #c0392b; }
  .legenda-dot.esgotado { background: #f5c6c6; border: 2px solid #f5c6c6; }

  .grade { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 6px; margin-bottom: 20px; }
  .num-btn { width: 100%; aspect-ratio: 1; border: 2px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; color: #333; position: relative; }
  .num-btn:hover:not(:disabled) { border-color: #c0392b; color: #c0392b; }
  .num-btn.selecionado { background: #c0392b; border-color: #c0392b; color: #fff; }
  .num-btn.esgotado { background: #fdecea; border-color: #fdecea; color: #ccc; cursor: not-allowed; text-decoration: line-through; }

  /* Painel de tamanho por número */
  .tam-painel { background: #fff; border: 2px solid #c0392b; border-radius: 10px; padding: 12px; margin-bottom: 14px; }
  .tam-painel-titulo { font-size: 12px; font-weight: 700; color: #c0392b; text-transform: uppercase; margin-bottom: 8px; }
  .tam-lista { display: flex; gap: 6px; flex-wrap: wrap; }
  .tam-btn { padding: 7px 14px; border: 2px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; color: #333; }
  .tam-btn:hover { border-color: #c0392b; color: #c0392b; }
  .tam-btn.selecionado { background: #c0392b; border-color: #c0392b; color: #fff; }

  /* Lista de selecionados */
  .itens-selecionados { margin-bottom: 16px; }
  .item-sel { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 13px; }
  .item-sel .num-tag { background: #c0392b; color: #fff; border-radius: 6px; padding: 2px 8px; font-weight: 700; font-size: 13px; margin-right: 8px; }
  .item-sel .tam-tag { color: #555; }
  .item-sel .rem-btn { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
  .item-sel.sem-tamanho { border-color: #f39c12; background: #fffdf0; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; }
  .form-group input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border .2s; }
  .form-group input:focus { outline: none; border-color: #c0392b; }

  .resumo { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .resumo-linha { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .resumo-linha:last-child { border-bottom: none; }
  .resumo-linha span:first-child { color: #666; }

  .btn-proximo { width: 100%; padding: 14px; background: #c0392b; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 4px; }
  .btn-proximo:hover { background: #a93226; }
  .btn-proximo:disabled { background: #ccc; cursor: not-allowed; }
  .btn-voltar { background: none; border: none; color: #c0392b; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; padding: 0; }

  .sucesso { text-align: center; padding: 24px 16px; }
  .sucesso .icone { font-size: 48px; margin-bottom: 12px; }
  .sucesso h2 { font-size: 20px; margin-bottom: 8px; color: #27ae60; }
  .sucesso .resumo-escolha { background: #f0faf4; border: 2px solid #27ae60; border-radius: 10px; padding: 14px 16px; margin: 16px 0; font-size: 14px; color: #1a7a40; text-align: left; }
  .sucesso .resumo-escolha div { padding: 3px 0; }
  .sucesso .instrucao { background: #fff8e1; border: 2px solid #f39c12; border-radius: 10px; padding: 14px 16px; margin: 12px 0; font-size: 14px; color: #7d5a00; line-height: 1.6; }
  .sucesso .instrucao strong { font-size: 16px; display: block; margin-bottom: 4px; color: #c0392b; }
  .seta-animada { font-size: 28px; display: block; animation: bounce 1s infinite; margin: 8px 0; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  .aviso { font-size: 12px; color: #e67e22; margin-bottom: 10px; }
  .loading { text-align: center; padding: 30px; color: #888; font-size: 14px; }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .grade { grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); }
  }
</style>
</head>
<body>
<div class="widget" id="app">
  <div class="loading">Carregando...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, onSnapshot, collection, getDocs, addDoc, updateDoc, arrayUnion, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAieRIFFHPnD-I_AcWQNpWSFu5xzW_8-r0",
  authDomain: "parceria-site.firebaseapp.com",
  projectId: "parceria-site",
  storageBucket: "parceria-site.firebasestorage.app",
  messagingSenderId: "514961108742",
  appId: "1:514961108742:web:0ee82bc5fedbb81cb77887"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// itens = [{ numero: 5, tamanho: 'G', nomeNaCamisa: 'JOÃO' }, ...]
let estado = {
  etapa: 1,
  produtos: [],
  produtoSelecionado: null,
  produtoAtualIndex: 0,    // índice do produto sendo preenchido na etapa 1
  itensPorProduto: {},     // { produtoId: [{ numero, tamanho, nomeNaCamisa }] }
  itens: [],               // itens do produto atual (atalho)
  numAtivo: null,
  nomeAtivoTemp: null,
  aguardandoNome: false,
  maxItens: null,
  bloquearNumeros: true,
  nomeNaCamisa: false,
  form: { nome: '', cpf: '', unidade: '' }
};

function maskCPF(v) {
  return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2').slice(0,14);
}
function maskPhone(v) {
  return v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2').slice(0,15);
}

function getProdutoIdDaURL() {
  return new URLSearchParams(window.location.search).get('produto') || null;
}

function getQtdDaURL() {
  const qtd = parseInt(new URLSearchParams(window.location.search).get('qtd') || '0');
  return qtd > 0 ? qtd : null;
}

function getBloquearDaURL() {
  const v = new URLSearchParams(window.location.search).get('bloquear');
  return v !== 'false'; // padrão true
}

function getNomeNaCamisaDaURL() {
  return new URLSearchParams(window.location.search).get('nomeNaCamisa') === 'true';
}

async function carregarProdutoPorId(id) {
  const snap = await getDoc(doc(db, 'produtos', id));
  if (!snap.exists()) return null;
  return { id: snap.id, ...snap.data() };
}

function escutarProduto(id) {
  onSnapshot(doc(db, 'produtos', id), (snap) => {
    if (!snap.exists()) return;
    const dados = { id: snap.id, ...snap.data() };
    if (estado.produtoSelecionado && estado.produtoSelecionado.id === id) {
      estado.produtoSelecionado = { ...estado.produtoSelecionado, vendidos: dados.vendidos || [] };
      if (estado.etapa === 1) renderizar();
    }
  });
}

async function carregarTodosProdutos() {
  const snap = await getDocs(collection(db, 'produtos'));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function salvarPedido() {
  // Verifica conflitos em todos os produtos
  for (const prod of estado.produtos) {
    const itens = estado.itensPorProduto[prod.id] || [];
    const numeros = itens.map(i => i.numero);
    const jaVendidos = numeros.filter(n => (prod.vendidos || []).includes(n));
    if (jaVendidos.length) {
      alert(`Os números ${jaVendidos.join(', ')} do produto "${prod.nome}" foram escolhidos por outra pessoa. Por favor, corrija.`);
      iniciarProduto(estado.produtos.indexOf(prod));
      estado.etapa = 1;
      renderizar();
      return;
    }
  }

  // Salva um pedido por produto
  for (const prod of estado.produtos) {
    const itens = estado.itensPorProduto[prod.id] || [];
    if (!itens.length) continue;
    const numeros = itens.map(i => i.numero);
    const pedido = {
      produtoId: prod.id,
      produtoNome: prod.nome,
      itens,
      quantidade: itens.length,
      numero: itens[0].numero,
      tamanho: itens[0].tamanho,
      nome: estado.form.nome,
      cpf: estado.form.cpf,
      telefone: '',
      unidade: estado.form.unidade,
      status: 'Aguardando pagamento',
      criadoEm: serverTimestamp()
    };
    await addDoc(collection(db, 'pedidos'), pedido);
    await updateDoc(doc(db, 'produtos', prod.id), { vendidos: arrayUnion(...numeros) });
  }

  const todosItens = Object.values(estado.itensPorProduto).flat();
  window.parent.postMessage({ tipo: 'widget-concluido', itens: todosItens }, '*');
  estado.etapa = 4;
  renderizar();
}

async function init() {
  try {
    const idDaURL = getProdutoIdDaURL();
    if (idDaURL) {
      const produto = await carregarProdutoPorId(idDaURL);
      if (produto) {
        estado.produtos = [produto];
        escutarProduto(idDaURL);
      }
    } else {
      const todos = await carregarTodosProdutos();
      // Filtra apenas produtos ativos
      estado.produtos = todos.filter(p => p.ativo !== false);
    }
    iniciarProduto(0);
    renderizar();
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading">Erro ao carregar. Verifique sua conexão.</div>';
  }
}

function iniciarProduto(index) {
  const p = estado.produtos[index];
  if (!p) return;
  estado.produtoAtualIndex = index;
  estado.produtoSelecionado = p;
  estado.itens = estado.itensPorProduto[p.id] || [];
  estado.maxItens = p.qtd || getQtdDaURL();
  estado.bloquearNumeros = p.bloquear !== undefined ? p.bloquear : getBloquearDaURL();
  estado.nomeNaCamisa = p.nomeNaCamisa !== undefined ? p.nomeNaCamisa : getNomeNaCamisaDaURL();
  estado.numAtivo = null;
  estado.aguardandoNome = false;
  estado.nomeAtivoTemp = null;
}

// ── Etapa 1: Escolhas ──────────────────────────────────────
function renderEtapa1() {
  const p = estado.produtoSelecionado;
  const vendidos = p ? (p.vendidos || []) : [];
  const tamanhos = p ? (p.tamanhos || []) : [];
  const numMin = p ? (p.numMin || 1) : 1;
  const numMax = p ? (p.numMax || 30) : 30;
  const numsSelecionados = estado.itens.map(i => i.numero);
  const totalProdutos = estado.produtos.length;
  const produtoNum = estado.produtoAtualIndex + 1;

  // Cabeçalho do produto atual
  const qtdLabel = estado.maxItens ? `— ${estado.maxItens} camisa${estado.maxItens > 1 ? 's' : ''}` : '';
  const seletorHTML = totalProdutos > 1
    ? `<div style="background:#c0392b;color:#fff;border-radius:10px 10px 0 0;padding:10px 16px;font-weight:700;font-size:14px;margin-bottom:12px;">
        🛒 Produto ${produtoNum} de ${totalProdutos}: ${p ? p.nome : ''} ${qtdLabel}
      </div>`
    : '';

  let gradeHTML = '', tamPainelHTML = '', itensSel = '', btnHTML = '';

  if (p) {
    // Grade de números
    let nums = '';
    for (let i = numMin; i <= numMax; i++) {
      const vendido = vendidos.includes(i);
      const esgotado = vendido && estado.bloquearNumeros !== false;
      const sel = numsSelecionados.includes(i);
      const ativo = estado.numAtivo === i;
      nums += `<button class="num-btn ${esgotado?'esgotado':''} ${sel||ativo?'selecionado':''}"
        ${esgotado?'disabled':''}
        onclick="clicarNumero(${i})"
        title="${esgotado?'Esgotado':sel?'Clique para remover':'Selecionar número '+i}"
      >${i}</button>`;
    }
    const labelQtd = estado.maxItens !== null
      ? `(selecione exatamente ${estado.maxItens})`
      : '(selecione um ou mais)';
    gradeHTML = `<div class="secao-label">Número das costas <span style="color:#888;font-weight:400;font-size:11px;">${labelQtd}</span></div>
      <div class="legenda">
        <span><span class="legenda-dot disponivel"></span>Disponível</span>
        <span><span class="legenda-dot selecionado"></span>Selecionado</span>
        <span><span class="legenda-dot esgotado"></span>Esgotado</span>
      </div>
      <div class="grade">${nums}</div>`;

    // Painel de tamanho (aparece quando há número ativo aguardando tamanho)
    if (estado.numAtivo !== null && !estado.aguardandoNome) {
      const tams = tamanhos.map(t =>
        `<button class="tam-btn" onclick="confirmarTamanho('${t}')">${t}</button>`
      ).join('');
      tamPainelHTML = `<div class="tam-painel">
        <div class="tam-painel-titulo">Número ${estado.numAtivo} — escolha o tamanho:</div>
        <div class="tam-lista">${tams}</div>
      </div>`;
    }

    // Painel de nome na camisa (aparece após selecionar tamanho, se ativado)
    if (estado.aguardandoNome) {
      tamPainelHTML = `<div class="tam-painel">
        <div class="tam-painel-titulo">Número ${estado.numAtivo} — digite o nome na camisa:</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <input type="text" id="inp-nome-camisa" value="${estado.nomeAtivoTemp||''}" 
            placeholder="Nome a ser estampado..." 
            style="flex:1;height:38px;padding:0 12px;border:2px solid #c0392b;border-radius:8px;font-size:14px;outline:none;">
          <button class="tam-btn" id="btn-confirmar-nome" style="white-space:nowrap;">✅ Confirmar</button>
        </div>
        <p style="font-size:11px;color:#888;margin-top:6px;">Digite o nome exatamente como deve aparecer na camisa.</p>
      </div>`; 
    }

    // Lista de itens já selecionados
    if (estado.itens.length) {
      const linhas = estado.itens.map(it => `
        <div class="item-sel">
          <div><span class="num-tag">#${it.numero}</span><span class="tam-tag">${it.tamanho}</span>${it.nomeNaCamisa?`<span class="tam-tag" style="background:#eafaf1;color:#1e8449;">✍️ ${it.nomeNaCamisa}</span>`:''}</div>
          <button class="rem-btn" onclick="removerItem(${it.numero})" title="Remover">×</button>
        </div>`).join('');
      itensSel = `<div class="itens-selecionados">
        <div class="secao-label" style="margin-bottom:6px;">Itens selecionados (${estado.itens.length})</div>
        ${linhas}
      </div>`;
    }

    const faltam = estado.maxItens !== null ? estado.maxItens - estado.itens.length : 0;
    const podeAvancar = estado.itens.length > 0 && estado.numAtivo === null && !estado.aguardandoNome
      && (estado.maxItens === null || estado.itens.length === estado.maxItens);

    const temProximoProduto = estado.produtoAtualIndex < estado.produtos.length - 1;
    if (estado.aguardandoNome) {
      btnHTML = `<button class="btn-proximo" disabled>Digite o nome na camisa para o número ${estado.numAtivo} acima ↑</button>`;
    } else if (estado.numAtivo !== null) {
      btnHTML = `<button class="btn-proximo" disabled>Selecione o tamanho do número ${estado.numAtivo} acima ↑</button>`;
    } else if (faltam > 0) {
      btnHTML = `<button class="btn-proximo" disabled>Selecione mais ${faltam} número${faltam !== 1 ? 's' : ''} para continuar</button>`;
    } else if (podeAvancar && temProximoProduto) {
      const proximoNome = estado.produtos[estado.produtoAtualIndex + 1].nome;
      btnHTML = `<button class="btn-proximo" onclick="avancarParaProximoProduto()">
        Próximo produto: ${proximoNome} →
      </button>`;
    } else {
      btnHTML = `<button class="btn-proximo" ${podeAvancar?'':'disabled'} onclick="irParaEtapa(2)">
        Continuar para seus dados →
      </button>`;
    }
  }

  return `<div class="tabs">
    <div class="tab active">1. Escolhas</div>
    <div class="tab">2. Seus dados</div>
    <div class="tab">3. Confirmar</div>
  </div>${seletorHTML}${gradeHTML}${tamPainelHTML}${itensSel}${btnHTML}`;
}

// ── Etapa 2: Dados pessoais ────────────────────────────────
function renderEtapa2() {
  const f = estado.form;
  return `<div class="tabs">
    <div class="tab">1. Escolhas</div>
    <div class="tab active">2. Seus dados</div>
    <div class="tab">3. Confirmar</div>
  </div>
  <button class="btn-voltar" onclick="irParaEtapa(1)">← Voltar</button>
  <div class="form-row full"><div class="form-group">
    <label>Nome completo *</label>
    <input type="text" value="${f.nome}" placeholder="Seu nome completo" oninput="atualizar('nome',this.value)">
  </div></div>
  <div class="form-row">
    <div class="form-group">
      <label>CPF *</label>
      <input type="text" value="${f.cpf}" placeholder="000.000.000-00" maxlength="14" oninput="atualizarMask('cpf',this,'cpf')">
    </div>
    <div class="form-group">

    </div>
  </div>
  <div class="form-row full"><div class="form-group">
    <label>Unidade em que estuda *</label>
    <select id="sel-unidade" style="padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;width:100%;" onchange="atualizar('unidade',this.value)">
      <option value="">Selecione a unidade...</option>
      ${(estado.produtoSelecionado.unidades||[]).slice().sort((a,b)=>a.localeCompare(b)).map(u=>`<option value="${u}" ${estado.form.unidade===u?'selected':''}>${u}</option>`).join('')}
    </select>
  </div></div>
  <button class="btn-proximo" onclick="validarEtapa2()">Continuar →</button>`;
}

// ── Etapa 3: Confirmação ───────────────────────────────────
function renderEtapa3() {
  const f = estado.form;
  const p = estado.produtoSelecionado;
  const linhasItens = estado.itens.map(it =>
    `<div class="resumo-linha"><span>Nº ${it.numero}</span><span>Tamanho ${it.tamanho}${it.nomeNaCamisa?' / '+it.nomeNaCamisa:''}</span></div>`
  ).join('');
  return `<div class="tabs">
    <div class="tab">1. Escolhas</div>
    <div class="tab">2. Seus dados</div>
    <div class="tab active">3. Confirmar</div>
  </div>
  <button class="btn-voltar" onclick="irParaEtapa(2)">← Voltar</button>
  <div class="resumo">
    <div class="resumo-linha"><span>Produto</span><span>${p.nome}</span></div>
    <div class="resumo-linha"><span>Quantidade</span><span>${estado.itens.length} item${estado.itens.length!==1?'s':''}</span></div>
    ${linhasItens}
    <div class="resumo-linha"><span>Unidade</span><span>${f.unidade}</span></div>
    <div class="resumo-linha"><span>Nome</span><span>${f.nome}</span></div>
    <div class="resumo-linha"><span>CPF</span><span>${f.cpf}</span></div>
    <div class="resumo-linha"><span>Telefone</span><span>Será preenchido via Bling</span></div>
  </div>
  <button class="btn-proximo" onclick="confirmarPedido()" id="btn-confirmar">✅ Confirmar pedido</button>`;
}

// ── Etapa 4: Sucesso ───────────────────────────────────────
function renderEtapa4() {
  const linhas = estado.itens.map(it =>
    `<div>✅ Número <strong>${it.numero}</strong> — Tamanho <strong>${it.tamanho}</strong></div>`
  ).join('');
  return `<div class="sucesso">
    <div class="icone">✅</div>
    <h2>Reserva confirmada!</h2>
    <div class="resumo-escolha">${linhas}</div>
    <div class="instrucao">
      <strong>⬆️ Agora clique em COMPRAR para finalizar o pagamento!</strong>
      Seus números estão reservados. Conclua a compra clicando no botão <strong>COMPRAR</strong> acima para garantir seu pedido.
    </div>
    <span class="seta-animada">⬆️</span>
  </div>`;
}

function renderizar() {
  const app = document.getElementById('app');
  let html = '<div class="widget">';
  if (estado.etapa === 1) html += renderEtapa1();
  else if (estado.etapa === 2) html += renderEtapa2();
  else if (estado.etapa === 3) html += renderEtapa3();
  else if (estado.etapa === 4) html += renderEtapa4();
  html += '</div>';
  app.innerHTML = html;

  // Adiciona eventos ao campo de nome na camisa se existir
  const inpNome = document.getElementById('inp-nome-camisa');
  if (inpNome) {
    inpNome.addEventListener('input', function() { estado.nomeAtivoTemp = this.value; });
    inpNome.addEventListener('keydown', function(e) { if (e.key === 'Enter') window.confirmarNome(); });
    inpNome.focus();
  }
  const btnNome = document.getElementById('btn-confirmar-nome');
  if (btnNome) btnNome.addEventListener('click', window.confirmarNome);

  // Notifica o pai sobre a altura atual para redimensionar o iframe
  setTimeout(() => {
    const h = document.body.scrollHeight;
    window.parent.postMessage({ tipo: 'widget-altura', altura: h }, '*');
  }, 50);
}

// ── Funções globais ────────────────────────────────────────
window.selecionarProduto = async (id) => {
  if (!id) { estado.produtoSelecionado = null; renderizar(); return; }
  estado.produtoSelecionado = estado.produtos.find(p => p.id === id) || null;
  estado.itens = [];
  estado.numAtivo = null;
  renderizar();
};

window.clicarNumero = (n) => {
  const jatem = estado.itens.find(i => i.numero === n);
  if (jatem) {
    // Remove o item se clicar novamente
    estado.itens = estado.itens.filter(i => i.numero !== n);
    if (estado.numAtivo === n) estado.numAtivo = null;
    renderizar();
    return;
  }
  // Verificar se atingiu o limite
  if (estado.maxItens !== null && estado.itens.length >= estado.maxItens) {
    alert(`Você só pode selecionar ${estado.maxItens} número${estado.maxItens !== 1 ? 's' : ''} conforme a quantidade do seu pedido.`);
    return;
  }
  // Ativa seleção de tamanho para esse número
  estado.numAtivo = n;
  renderizar();
};

window.confirmarTamanho = (tamanho) => {
  if (estado.numAtivo === null) return;
  estado.tamanhoTemp = tamanho;
  if (estado.nomeNaCamisa) {
    estado.aguardandoNome = true;
    estado.nomeAtivoTemp = '';
    renderizar();
    setTimeout(() => { const el = document.getElementById('inp-nome-camisa'); if (el) el.focus(); }, 100);
  } else {
    const item = { numero: estado.numAtivo, tamanho, nomeNaCamisa: '' };
    estado.itens.push(item);
    estado.itensPorProduto[estado.produtoSelecionado.id] = [...estado.itens];
    estado.numAtivo = null;
    estado.tamanhoTemp = null;
    renderizar();
  }
};

window.confirmarNome = () => {
  const nome = (estado.nomeAtivoTemp || '').trim();
  if (!nome) { alert('Digite o nome para continuar.'); return; }
  const numeroConfirmado = estado.numAtivo;
  const tamanhoConfirmado = estado.tamanhoTemp;
  estado.numAtivo = null;
  estado.tamanhoTemp = null;
  estado.aguardandoNome = false;
  estado.nomeAtivoTemp = '';
  estado.itens.push({ numero: numeroConfirmado, tamanho: tamanhoConfirmado, nomeNaCamisa: nome });
  estado.itensPorProduto[estado.produtoSelecionado.id] = [...estado.itens];
  renderizar();
};

window.avancarParaProximoProduto = () => {
  const proximoIndex = estado.produtoAtualIndex + 1;
  if (proximoIndex < estado.produtos.length) {
    iniciarProduto(proximoIndex);
    renderizar();
  }
};

window.removerItem = (n) => {
  estado.itens = estado.itens.filter(i => i.numero !== n);
  estado.itensPorProduto[estado.produtoSelecionado.id] = [...estado.itens];
  if (estado.numAtivo === n) { estado.numAtivo = null; estado.aguardandoNome = false; estado.nomeAtivoTemp = ''; }
  renderizar();
};

window.irParaEtapa = (e) => { estado.etapa = e; renderizar(); };
window.atualizar = (campo, valor) => { estado.form[campo] = valor; };
window.atualizarMask = (campo, el, tipo) => {
  const v = tipo === 'cpf' ? maskCPF(el.value) : maskPhone(el.value);
  estado.form[campo] = v; el.value = v;
};
window.validarEtapa2 = () => {
  const f = estado.form;
  if (!f.nome || !f.cpf || !f.unidade) { alert('Preencha todos os campos obrigatórios (*)'); return; }
  estado.etapa = 3; renderizar();
};
window.confirmarPedido = async () => {
  const btn = document.getElementById('btn-confirmar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
  try {
    await salvarPedido();
  } catch(e) {
    alert('Erro ao salvar pedido. Tente novamente.');
    if (btn) { btn.disabled = false; btn.textContent = '✅ Confirmar pedido'; }
  }
};

init();
</script>
</body>
</html>
