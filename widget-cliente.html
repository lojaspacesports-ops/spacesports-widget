<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Sports — Escolha seu número</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #222; }

  .widget { max-width: 680px; margin: 0 auto; padding: 16px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
  .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .tab.active { color: #c0392b; border-bottom-color: #c0392b; }

  /* Produto selector (oculto quando ?produto= presente) */
  .produto-selector { margin-bottom: 18px; }
  .produto-selector label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; display: block; margin-bottom: 6px; }
  .produto-selector select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; }

  /* Grade de números */
  .secao-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; margin-bottom: 8px; }
  .legenda { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legenda span { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
  .legenda-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .legenda-dot.disponivel { border: 2px solid #ccc; background: #fff; }
  .legenda-dot.selecionado { background: #c0392b; }
  .legenda-dot.esgotado { background: #f5c6c6; border: 2px solid #f5c6c6; }

  .grade { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 6px; margin-bottom: 20px; }
  .num-btn { width: 100%; aspect-ratio: 1; border: 2px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; color: #333; }
  .num-btn:hover:not(:disabled) { border-color: #c0392b; color: #c0392b; }
  .num-btn.selecionado { background: #c0392b; border-color: #c0392b; color: #fff; }
  .num-btn.esgotado { background: #fdecea; border-color: #fdecea; color: #ccc; cursor: not-allowed; text-decoration: line-through; }

  /* Tamanhos */
  .tamanhos { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .tam-btn { padding: 8px 16px; border: 2px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; color: #333; }
  .tam-btn:hover { border-color: #c0392b; color: #c0392b; }
  .tam-btn.selecionado { background: #c0392b; border-color: #c0392b; color: #fff; }

  /* Campos de formulário */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; }
  .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border .2s; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #c0392b; }

  /* Resumo confirmação */
  .resumo { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .resumo-linha { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .resumo-linha:last-child { border-bottom: none; font-weight: 700; }
  .resumo-linha span:first-child { color: #666; }

  /* Botões */
  .btn-proximo { width: 100%; padding: 14px; background: #c0392b; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 4px; }
  .btn-proximo:hover { background: #a93226; }
  .btn-proximo:disabled { background: #ccc; cursor: not-allowed; }
  .btn-voltar { background: none; border: none; color: #c0392b; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; padding: 0; }

  .sucesso { text-align: center; padding: 30px 20px; }
  .sucesso .icone { font-size: 48px; margin-bottom: 12px; }
  .sucesso h2 { font-size: 20px; margin-bottom: 8px; color: #27ae60; }
  .sucesso p { font-size: 14px; color: #555; line-height: 1.6; }

  .loading { text-align: center; padding: 30px; color: #888; font-size: 14px; }
  .erro-msg { color: #c0392b; font-size: 13px; margin-top: 6px; }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .grade { grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); }
  }
</style>
</head>
<body>
<div class="widget" id="app">
  <div class="loading">Carregando...</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, arrayUnion, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAieRIFFHPnD-I_AcWQNpWSFu5xzW_8-r0",
  authDomain: "parceria-site.firebaseapp.com",
  projectId: "parceria-site",
  storageBucket: "parceria-site.firebasestorage.app",
  messagingSenderId: "514961108742",
  appId: "1:514961108742:web:0ee82bc5fedbb81cb77887"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── Estado global ──────────────────────────────────────────
let estado = {
  etapa: 1,           // 1=escolhas, 2=dados, 3=endereço, 4=confirmar
  produtos: [],
  produtoSelecionado: null,
  numeroSelecionado: null,
  tamanhoSelecionado: null,
  form: {
    nome: '', cpf: '', email: '', telefone: '', nascimento: '',
    cep: '', rua: '', numero: '', complemento: '', bairro: '', cidade: '', estado: ''
  }
};

// ── Utilitários ────────────────────────────────────────────
function maskCPF(v) {
  return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2').slice(0,14);
}
function maskPhone(v) {
  return v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2').slice(0,15);
}
function maskCEP(v) {
  return v.replace(/\D/g,'').replace(/(\d{5})(\d)/,'$1-$2').slice(0,9);
}

// ── Pegar ID do produto pela URL ───────────────────────────
function getProdutoIdDaURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('produto') || null;
}

// ── Carregar produto específico pelo ID ────────────────────
async function carregarProdutoPorId(id) {
  const snap = await getDoc(doc(db, 'produtos', id));
  if (!snap.exists()) return null;
  return { id: snap.id, ...snap.data() };
}

// ── Carregar todos os produtos ─────────────────────────────
async function carregarTodosProdutos() {
  const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
  const snap = await getDocs(collection(db, 'produtos'));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// ── Inicializar ────────────────────────────────────────────
async function init() {
  try {
    const idDaURL = getProdutoIdDaURL();

    if (idDaURL) {
      // Modo automático: produto definido pela URL do iframe
      const produto = await carregarProdutoPorId(idDaURL);
      if (produto) {
        estado.produtoSelecionado = produto;
        estado.produtos = [produto];
      }
    } else {
      // Modo manual: mostra dropdown de seleção
      estado.produtos = await carregarTodosProdutos();
    }

    renderizar();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Erro ao carregar. Verifique sua conexão.</div>';
    console.error(e);
  }
}

// ── Buscar CEP ─────────────────────────────────────────────
async function buscarCEP(cep) {
  const c = cep.replace(/\D/g,'');
  if (c.length !== 8) return;
  try {
    const r = await fetch(`https://viacep.com.br/ws/${c}/json/`);
    const d = await r.json();
    if (!d.erro) {
      estado.form.rua = d.logradouro || '';
      estado.form.bairro = d.bairro || '';
      estado.form.cidade = d.localidade || '';
      estado.form.estado = d.uf || '';
      renderizar();
      setTimeout(() => document.getElementById('f-numero')?.focus(), 100);
    }
  } catch(e) {}
}

// ── Salvar pedido no Firebase ──────────────────────────────
async function salvarPedido() {
  const p = estado.produtoSelecionado;
  const num = estado.numeroSelecionado;

  // Verifica se número ainda disponível
  if ((p.vendidos || []).includes(num)) {
    alert('Este número acabou de ser escolhido por outra pessoa. Por favor, escolha outro.');
    estado.etapa = 1;
    estado.numeroSelecionado = null;
    renderizar();
    return;
  }

  const pedido = {
    produtoId: p.id,
    produtoNome: p.nome,
    numero: num,
    tamanho: estado.tamanhoSelecionado,
    ...estado.form,
    status: 'Pendente',
    criadoEm: serverTimestamp()
  };

  await addDoc(collection(db, 'pedidos'), pedido);
  await updateDoc(doc(db, 'produtos', p.id), { vendidos: arrayUnion(num) });

  estado.etapa = 5; // sucesso
  renderizar();
}

// ── Render etapa 1: escolhas ───────────────────────────────
function renderEtapa1() {
  const p = estado.produtoSelecionado;
  const vendidos = p ? (p.vendidos || []) : [];
  const tamanhos = p ? (p.tamanhos || []) : [];
  const numMin = p ? (p.numMin || 1) : 1;
  const numMax = p ? (p.numMax || 30) : 30;

  let seletorHTML = '';
  if (!getProdutoIdDaURL()) {
    const opts = estado.produtos.map(pr =>
      `<option value="${pr.id}" ${p && p.id === pr.id ? 'selected' : ''}>${pr.nome}</option>`
    ).join('');
    seletorHTML = `
      <div class="produto-selector">
        <label>Produto</label>
        <select id="sel-produto" onchange="selecionarProduto(this.value)">
          <option value="">Selecione o produto...</option>
          ${opts}
        </select>
      </div>`;
  }

  let gradeHTML = '';
  let tamanhoHTML = '';
  let btnHTML = '';

  if (p) {
    // Grade de números
    let nums = '';
    for (let i = numMin; i <= numMax; i++) {
      const esgotado = vendidos.includes(i);
      const sel = estado.numeroSelecionado === i;
      nums += `<button class="num-btn ${esgotado ? 'esgotado' : ''} ${sel ? 'selecionado' : ''}"
        ${esgotado ? 'disabled' : ''}
        onclick="selecionarNumero(${i})">${i}</button>`;
    }
    gradeHTML = `
      <div class="secao-label">Número das costas</div>
      <div class="legenda">
        <span><span class="legenda-dot disponivel"></span>Disponível</span>
        <span><span class="legenda-dot selecionado"></span>Selecionado</span>
        <span><span class="legenda-dot esgotado"></span>Esgotado</span>
      </div>
      <div class="grade">${nums}</div>`;

    // Tamanhos
    const tams = tamanhos.map(t =>
      `<button class="tam-btn ${estado.tamanhoSelecionado === t ? 'selecionado' : ''}" onclick="selecionarTamanho('${t}')">${t}</button>`
    ).join('');
    tamanhoHTML = `
      <div class="secao-label">Tamanho</div>
      <div class="tamanhos">${tams}</div>`;

    const podeAvancar = estado.numeroSelecionado && estado.tamanhoSelecionado;
    btnHTML = `<button class="btn-proximo" ${podeAvancar ? '' : 'disabled'} onclick="irParaEtapa(2)">Continuar →</button>`;
  }

  return `
    <div class="tabs">
      <div class="tab active">1. Escolhas</div>
      <div class="tab">2. Seus dados</div>
      <div class="tab">3. Endereço</div>
      <div class="tab">4. Confirmar</div>
    </div>
    ${seletorHTML}
    ${gradeHTML}
    ${tamanhoHTML}
    ${btnHTML}`;
}

// ── Render etapa 2: dados pessoais ─────────────────────────
function renderEtapa2() {
  const f = estado.form;
  return `
    <div class="tabs">
      <div class="tab">1. Escolhas</div>
      <div class="tab active">2. Seus dados</div>
      <div class="tab">3. Endereço</div>
      <div class="tab">4. Confirmar</div>
    </div>
    <button class="btn-voltar" onclick="irParaEtapa(1)">← Voltar</button>
    <div class="form-row full"><div class="form-group">
      <label>Nome completo *</label>
      <input id="f-nome" type="text" value="${f.nome}" placeholder="Seu nome completo" oninput="atualizar('nome',this.value)">
    </div></div>
    <div class="form-row">
      <div class="form-group">
        <label>CPF *</label>
        <input id="f-cpf" type="text" value="${f.cpf}" placeholder="000.000.000-00" maxlength="14" oninput="atualizarMask('cpf',this,'cpf')">
      </div>
      <div class="form-group">
        <label>Data de nascimento</label>
        <input id="f-nasc" type="date" value="${f.nascimento}" oninput="atualizar('nascimento',this.value)">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>E-mail *</label>
        <input id="f-email" type="email" value="${f.email}" placeholder="seu@email.com" oninput="atualizar('email',this.value)">
      </div>
      <div class="form-group">
        <label>Telefone/WhatsApp *</label>
        <input id="f-tel" type="text" value="${f.telefone}" placeholder="(00) 00000-0000" maxlength="15" oninput="atualizarMask('telefone',this,'phone')">
      </div>
    </div>
    <button class="btn-proximo" onclick="validarEtapa2()">Continuar →</button>`;
}

// ── Render etapa 3: endereço ───────────────────────────────
function renderEtapa3() {
  const f = estado.form;
  return `
    <div class="tabs">
      <div class="tab">1. Escolhas</div>
      <div class="tab">2. Seus dados</div>
      <div class="tab active">3. Endereço</div>
      <div class="tab">4. Confirmar</div>
    </div>
    <button class="btn-voltar" onclick="irParaEtapa(2)">← Voltar</button>
    <div class="form-row">
      <div class="form-group">
        <label>CEP *</label>
        <input id="f-cep" type="text" value="${f.cep}" placeholder="00000-000" maxlength="9"
          oninput="atualizarCEP(this)">
      </div>
      <div class="form-group">
        <label>Número *</label>
        <input id="f-numero" type="text" value="${f.numero}" placeholder="123" oninput="atualizar('numero',this.value)">
      </div>
    </div>
    <div class="form-row full"><div class="form-group">
      <label>Rua *</label>
      <input id="f-rua" type="text" value="${f.rua}" placeholder="Nome da rua" oninput="atualizar('rua',this.value)">
    </div></div>
    <div class="form-row">
      <div class="form-group">
        <label>Complemento</label>
        <input id="f-comp" type="text" value="${f.complemento}" placeholder="Apto, bloco..." oninput="atualizar('complemento',this.value)">
      </div>
      <div class="form-group">
        <label>Bairro *</label>
        <input id="f-bairro" type="text" value="${f.bairro}" placeholder="Bairro" oninput="atualizar('bairro',this.value)">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cidade *</label>
        <input id="f-cidade" type="text" value="${f.cidade}" placeholder="Cidade" oninput="atualizar('cidade',this.value)">
      </div>
      <div class="form-group">
        <label>Estado *</label>
        <input id="f-estado" type="text" value="${f.estado}" placeholder="UF" maxlength="2" oninput="atualizar('estado',this.value)">
      </div>
    </div>
    <button class="btn-proximo" onclick="validarEtapa3()">Continuar →</button>`;
}

// ── Render etapa 4: confirmação ────────────────────────────
function renderEtapa4() {
  const f = estado.form;
  const p = estado.produtoSelecionado;
  return `
    <div class="tabs">
      <div class="tab">1. Escolhas</div>
      <div class="tab">2. Seus dados</div>
      <div class="tab">3. Endereço</div>
      <div class="tab active">4. Confirmar</div>
    </div>
    <button class="btn-voltar" onclick="irParaEtapa(3)">← Voltar</button>
    <div class="resumo">
      <div class="resumo-linha"><span>Produto</span><span>${p.nome}</span></div>
      <div class="resumo-linha"><span>Número das costas</span><span>${estado.numeroSelecionado}</span></div>
      <div class="resumo-linha"><span>Tamanho</span><span>${estado.tamanhoSelecionado}</span></div>
      <div class="resumo-linha"><span>Nome</span><span>${f.nome}</span></div>
      <div class="resumo-linha"><span>CPF</span><span>${f.cpf}</span></div>
      <div class="resumo-linha"><span>E-mail</span><span>${f.email}</span></div>
      <div class="resumo-linha"><span>Telefone</span><span>${f.telefone}</span></div>
      <div class="resumo-linha"><span>Endereço</span><span>${f.rua}, ${f.numero}${f.complemento ? ' ' + f.complemento : ''} — ${f.bairro}, ${f.cidade}/${f.estado} — CEP ${f.cep}</span></div>
    </div>
    <button class="btn-proximo" onclick="confirmarPedido()" id="btn-confirmar">✅ Confirmar pedido</button>`;
}

// ── Render etapa 5: sucesso ────────────────────────────────
function renderEtapa5() {
  return `
    <div class="sucesso">
      <div class="icone">🎉</div>
      <h2>Pedido registrado!</h2>
      <p>O número <strong>${estado.numeroSelecionado}</strong> tamanho <strong>${estado.tamanhoSelecionado}</strong> está reservado para <strong>${estado.form.nome}</strong>.<br><br>
      Entraremos em contato pelo WhatsApp <strong>${estado.form.telefone}</strong> para finalizar o pagamento.</p>
    </div>`;
}

// ── Renderizar ─────────────────────────────────────────────
function renderizar() {
  const app = document.getElementById('app');
  let html = '<div class="widget">';
  if (estado.etapa === 1) html += renderEtapa1();
  else if (estado.etapa === 2) html += renderEtapa2();
  else if (estado.etapa === 3) html += renderEtapa3();
  else if (estado.etapa === 4) html += renderEtapa4();
  else if (estado.etapa === 5) html += renderEtapa5();
  html += '</div>';
  app.innerHTML = html;
}

// ── Funções globais (chamadas pelo HTML) ───────────────────
window.selecionarProduto = async (id) => {
  if (!id) { estado.produtoSelecionado = null; renderizar(); return; }
  estado.produtoSelecionado = estado.produtos.find(p => p.id === id) || null;
  estado.numeroSelecionado = null;
  estado.tamanhoSelecionado = null;
  renderizar();
};

window.selecionarNumero = (n) => {
  estado.numeroSelecionado = n;
  renderizar();
};

window.selecionarTamanho = (t) => {
  estado.tamanhoSelecionado = t;
  renderizar();
};

window.irParaEtapa = (e) => {
  estado.etapa = e;
  renderizar();
};

window.atualizar = (campo, valor) => {
  estado.form[campo] = valor;
};

window.atualizarMask = (campo, el, tipo) => {
  const v = tipo === 'cpf' ? maskCPF(el.value) : maskPhone(el.value);
  estado.form[campo] = v;
  el.value = v;
};

window.atualizarCEP = (el) => {
  const v = maskCEP(el.value);
  estado.form.cep = v;
  el.value = v;
  if (v.replace(/\D/g,'').length === 8) buscarCEP(v);
};

window.validarEtapa2 = () => {
  const f = estado.form;
  if (!f.nome || !f.cpf || !f.email || !f.telefone) {
    alert('Preencha todos os campos obrigatórios (*)');
    return;
  }
  estado.etapa = 3;
  renderizar();
};

window.validarEtapa3 = () => {
  const f = estado.form;
  if (!f.cep || !f.rua || !f.numero || !f.bairro || !f.cidade || !f.estado) {
    alert('Preencha todos os campos obrigatórios (*)');
    return;
  }
  estado.etapa = 4;
  renderizar();
};

window.confirmarPedido = async () => {
  const btn = document.getElementById('btn-confirmar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
  try {
    await salvarPedido();
  } catch(e) {
    alert('Erro ao salvar pedido. Tente novamente.');
    if (btn) { btn.disabled = false; btn.textContent = '✅ Confirmar pedido'; }
    console.error(e);
  }
};

init();
</script>
</body>
</html>
